name: Python linting

on: 
  - workflow_dispatch
  - pull_request

jobs:
  lintingOperation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: psf/black@stable
        with:
          linter: flake8
