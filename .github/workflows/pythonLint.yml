name: Python linting

on: 
  - workflow_dispatch

jobs:
  lintingOperation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'
      - uses: advanced-security/python-lint-code-scanning-action@v1
        with:
          linter: flake8
